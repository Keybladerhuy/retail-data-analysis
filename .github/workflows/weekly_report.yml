name: Weekly Retail Report

on:
  schedule:
    - cron: '0 23 * * 0'  # Sunday 23:00 UTC = Monday 08:00 JST
  workflow_dispatch:        # allow manual trigger for testing

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google Sheets credentials
        if: ${{ secrets.GOOGLE_SHEETS_KEY_JSON != '' }}
        run: |
          echo '${{ secrets.GOOGLE_SHEETS_KEY_JSON }}' > /tmp/gsheets_key.json
          echo "GOOGLE_SHEETS_KEY_PATH=/tmp/gsheets_key.json" >> $GITHUB_ENV

      - name: Generate report
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          REPORT_RECIPIENT_EMAIL: ${{ secrets.REPORT_RECIPIENT_EMAIL }}
          REPORT_SENDER_EMAIL: ${{ secrets.REPORT_SENDER_EMAIL }}
          GOOGLE_SHEETS_TEMPLATE_ID: ${{ secrets.GOOGLE_SHEETS_TEMPLATE_ID }}
        run: python generate_report.py

      - name: Commit and push updated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "chore: weekly report update [skip ci]"
          git push
